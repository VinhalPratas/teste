<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema SantoryTec</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Segoe UI',sans-serif;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

.main{
  display:flex;
  justify-content:center;
  gap:20px;
  padding:20px;
  min-height:100vh;
}

.box{
  min-height:650px;
  display:flex;
  flex-direction:column;
  border-radius:18px;
  padding:20px;
}

.container{
  width:600px;
  background:#fff;
  box-shadow:0 20px 40px rgba(0,0,0,0.25);
}

.side{
  width:260px;
  background:rgba(255,255,255,0.1);
  color:white;
}

select, input{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:10px;
  border:1px solid #e5e7eb;
}

textarea{
  padding:12px;
  border-radius:10px;
  border:1px solid #e5e7eb;
  resize:none;
  color:#000;
}

#resultado{
  height:220px;
  margin-top:10px;
  overflow:auto;
}

button{
  width:100%;
  padding:12px;
  margin-top:8px;
  border:none;
  border-radius:12px;
  background: linear-gradient(135deg,#4facfe,#00f2fe);
  color:white;
  cursor:pointer;
}

.hidden{display:none}

.logo{
  width:160px;
  margin:0 auto 10px;
  display:block;
}

h2{text-align:center;margin-bottom:15px;}

.section{
  margin-top:15px;
  padding:15px;
  border-radius:12px;
  background:#f9fafb;
}

.footer{
  text-align:center;
  font-size:12px;
  margin-top:10px;
  color:#9ca3af;
}

.radio-group{
  display:flex;
  gap:30px;
  margin-top:10px;
}

.radio-item{
  display:flex;
  align-items:center;
  gap:6px;
  white-space:nowrap;
  font-size:14px;
  cursor:pointer;
}

.radio-item input{
  accent-color:#00c6ff;
}
</style>
</head>

<script>

function trocar(){
 document.getElementById('exame').classList.add('hidden');
 document.getElementById('exameEncaixe').classList.add('hidden');
 document.getElementById('consulta').classList.add('hidden');
 document.getElementById('retorno').classList.add('hidden');
 document.getElementById('orcamento').classList.add('hidden');
 document.getElementById('confirmacao').classList.add('hidden');

 let t=document.getElementById('tipo').value;
 if(t) document.getElementById(t).classList.remove('hidden');
}

function gerarExame(){
 let data=document.getElementById('dataE').value;
 let hora=document.getElementById('horaE').value;
 let exame=document.getElementById('exameNome').value;

 let tipo = document.querySelector('input[name="tipoE"]:checked')?.value || "";
 let info = tipo ? `${hora} - ${tipo}` : hora;

 document.getElementById('resultado').value=`*Seu exame foi agendado:*\n\n🗓 Data: ${data}\n⏰ Horário: ${info}\n📌 Exame: ${exame}\n\n⏳ Importante:\nPodem ocorrer atrasos devido a intercorrências, mas faremos o possível para atendê-lo(a) no menor tempo possível.\n\nCaso tenha dúvidas, estamos à disposição!`;
}

function gerarExameEncaixe(){
 let data=document.getElementById('dataEE').value;
 let hora=document.getElementById('horaEE').value;
 let exame=document.getElementById('exameNomeEE').value;

 let info = `${hora} - Horário estimado`;

 document.getElementById('resultado').value=`*Seu exame foi agendado (Encaixe):*\n\n🗓 Data: ${data}\n⏰ Horário: ${info}\n📌 Exame: ${exame}\n\n⏳ Importante:\nSeu exame será realizado por encaixe, ou seja, você será atendido(a) entre um agendamento e outro, conforme o andamento dos exames do dia.\nNossa equipe faz o possível para que todos sejam atendidos com agilidade e cuidado, e seu exame será realizado assim que houver uma oportunidade na agenda.\n\nCaso tenha dúvidas, estamos à disposição!`;
}

function gerarConsulta(){
 let data=document.getElementById('dataC').value;
 let hora=document.getElementById('horaC').value;
 let medico=document.getElementById('medico').value;

 let tipo = document.querySelector('input[name="tipoC"]:checked')?.value || "";
 let info = tipo ? `${hora} - ${tipo}` : hora;

 document.getElementById('resultado').value=`*Sua consulta foi agendada:*\n\n🗓 Data: ${data}\n⏰ Horário: ${info}\n👨‍⚕️ Médico: ${medico}\n\n⏳ Importante:\nPodem ocorrer atrasos devido a intercorrências, mas faremos o possível para atendê-lo(a) no menor tempo possível.\n\nCaso tenha dúvidas, estamos à disposição!`;
}

function gerarRetorno(){
 let data=document.getElementById('dataR').value;
 let hora=document.getElementById('horaR').value;
 let medico=document.getElementById('medicoR').value;

 let tipo = document.querySelector('input[name="tipoR"]:checked')?.value || "";
 let info = tipo ? `${hora} - ${tipo}` : hora;

 document.getElementById('resultado').value=`*Seu retorno foi agendado:*\n\n🗓 Data: ${data}\n⏰ Horário: ${info}\n👨‍⚕️ Médico: ${medico}\n\n📌 Este atendimento é referente a retorno médico.\n\n⏳ Podem ocorrer atrasos devido a intercorrências, mas faremos o possível para atendê-lo(a) no menor tempo possível.\n\nCaso tenha dúvidas, estamos à disposição!`;
}

let contador=0;

function addItem(){
 contador++;
 let div=document.createElement('div');
 div.innerHTML=`<input id="ex${contador}" placeholder="Exame"><input id="cv${contador}" placeholder="Convênio"><input id="vl${contador}" type="number" placeholder="Valor">`;
 document.getElementById('itens').appendChild(div);
}

function gerarOrcamento(){
 let total=0;
 let txt="*Orçamento de Exames:*\n\n";
 for(let i=1;i<=contador;i++){
  let ex=document.getElementById('ex'+i)?.value;
  let cv=document.getElementById('cv'+i)?.value;
  let vl=parseFloat(document.getElementById('vl'+i)?.value)||0;
  if(ex){
    txt+=`📌 ${ex} (${cv}) - R$ ${vl.toFixed(2)}\n`;
    total+=vl;
  }
 }
 txt+=`\n💰 Total: R$ ${total.toFixed(2)}\n\nPagamento em dinheiro, PIX e cartões de CRÉDITO e DÉBITO\nOferecemos parcelamento em até 2 vezes sem juros ou em até 10 vezes, com acréscimo.`;
 document.getElementById('resultado').value=txt;
}

function gerarConfirmacao(){
 let servico = document.getElementById('servicoConfirmacao').value;
 let data = document.getElementById('dataConfirmacao').value;
 let hora = document.getElementById('horaConfirmacao').value;

 let tipo = document.querySelector('input[name="tipoConfirmacao"]:checked')?.value || "";

 document.getElementById('resultado').value =
 `*Confirmação de atendimento:*\n\n` +
 `📌 Tipo de atendimento: ${servico}\n` +
 `🗓  Data: ${data}\n` +
 `⏰ Horário: ${hora}\n` +
 `📍  Tipo de atendimento: ${tipo}\n\n` +
 `⚠️ Em caso de imprevisto ou necessidade de alteração, pedimos que entre em contato conosco com antecedência.\n\n` +
 `Caso tenha dúvidas, estamos à disposição!`;
}

function copiar(){
 let area=document.getElementById('resultado');
 area.select();
 document.execCommand('copy');
}

addItem();

</script>
